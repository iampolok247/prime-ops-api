name: Node.js CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. Install dependencies (optional for CI validation)
      - name: Install Dependencies
        run: npm ci

      # 4. Configure SSH
      - name: Configure SSH
        run: |
          test -n "${{ secrets.VPS_DEPLOY_KEY }}" || { echo "Missing VPS_DEPLOY_KEY"; exit 1; }
          test -n "${{ secrets.SERVER_HOST }}" || { echo "Missing SERVER_HOST"; exit 1; }
          test -n "${{ secrets.SSH_PORT }}" || { echo "Missing SSH_PORT"; exit 1; }
          test -n "${{ secrets.SERVER_USER }}" || { echo "Missing SERVER_USER"; exit 1; }
          test -n "${{ secrets.TARGET_DIR }}" || { echo "Missing TARGET_DIR"; exit 1; }

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # 5. Ensure target directory exists
      - name: Ensure target directory exists
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p "${{ secrets.SSH_PORT }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p '${{ secrets.TARGET_DIR }}'"

      # 6. Deploy files to VPS
      - name: Deploy files to VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".github" \
            --exclude ".env" \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.TARGET_DIR }}/"

      # 7. Setup ENV + Install + Restart PM2
      - name: Setup ENV and Restart Backend
        run: |
          ssh -i ~/.ssh/id_rsa \
          -p "${{ secrets.SSH_PORT }}" \
          -o StrictHostKeyChecking=yes \
          "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF

          cd "${{ secrets.TARGET_DIR }}"

          # Create .env safely
          cat <<EOT > .env
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          PORT=5001
          NODE_ENV=production
          EOT

          # Install production dependencies
          npm ci --omit=dev

          # Restart PM2 (no downtime if already running)
          pm2 restart prime.server || pm2 start ecosystem.config.cjs

          # Save PM2 process list
          pm2 save

          EOF